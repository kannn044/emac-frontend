# snippet: proxy ไป backend api-mophlink.moph.go.th ผ่าน TLS
# วางใน /etc/nginx/snippets/emac-api-proxy.conf
proxy_http_version 1.1;
proxy_set_header Connection "";
# Host ต้องเป็นของ backend เพื่อให้เข้า server block ที่ถูกบน api-mophlink
proxy_set_header Host              api-mophlink.moph.go.th;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
# SNI สำหรับ TLS ไป upstream
proxy_ssl_server_name on;
proxy_ssl_name        api-mophlink.moph.go.th;
proxy_connect_timeout 5s;
proxy_read_timeout    30s;
proxy_send_timeout    30s;
