# nginx config — emac.moph.go.th (frontend machine)
# frontend เรียก API แบบ same-origin (VITE_API_BASE ว่าง) → nginx proxy
# /auth, /api, /embed ต่อไปยัง backend ที่ api-mophlink.moph.go.th/drugallergy
#
# วางใน /etc/nginx/conf.d/emac.conf แล้ว `nginx -t && systemctl reload nginx`

# backend ปลายทาง (ผ่าน TLS)
upstream emac_web_upstream {
    server 127.0.0.1:4180;   # vite preview (pm2: emac-web)
    keepalive 16;
}

server {
    listen       443 ssl http2;
    listen       [::]:443 ssl http2;
    server_name  emac.moph.go.th;

    ssl_certificate     /etc/nginx/ssl/bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/wildcard_moph_go_th.key;
    ssl_session_cache   shared:SSL:1m;
    ssl_session_timeout 10m;

    # ---- API proxy → backend (same-origin จึงไม่ติด CORS) ----
    # /auth/mode → https://api-mophlink.moph.go.th/drugallergy/auth/mode
    location /auth/ {
        proxy_pass https://api-mophlink.moph.go.th/drugallergy/auth/;
        include /etc/nginx/snippets/emac-api-proxy.conf;
    }
    location /api/ {
        proxy_pass https://api-mophlink.moph.go.th/drugallergy/api/;
        include /etc/nginx/snippets/emac-api-proxy.conf;
    }
    location /embed/ {
        proxy_pass https://api-mophlink.moph.go.th/drugallergy/embed/;
        include /etc/nginx/snippets/emac-api-proxy.conf;
    }

    # ---- Frontend (vite preview) ----
    location / {
        proxy_pass http://emac_web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS
server {
    listen      80;
    listen      [::]:80;
    server_name emac.moph.go.th;
    return 301 https://$host$request_uri;
}
