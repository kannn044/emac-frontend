# nginx config — emac.moph.go.th (frontend machine, ไม่มี backend ในเครื่อง)
# frontend = static build (npm run build:emac → /var/www/emac-frontend/dist)
# API      = proxy /auth, /api, /embed → https://api-mophlink.moph.go.th/drugallergy
#            (same-origin สำหรับเบราว์เซอร์ → ไม่ติด CORS)
#
# ต้องใช้คู่กับ /etc/nginx/snippets/emac-api-proxy.conf (ดู deploy/snippets/)
# RHEL/CentOS: setsebool -P httpd_can_network_connect 1 (ให้ nginx ต่อออก host ภายนอกได้)

limit_req_zone $binary_remote_addr zone=emac_rl:10m rate=20r/s;

server {
    listen       443 ssl http2;
    listen       [::]:443 ssl http2;
    server_name  emac.moph.go.th;

    ssl_certificate     /etc/nginx/ssl/bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/wildcard_moph_go_th.key;
    ssl_session_cache   shared:SSL:1m;
    ssl_session_timeout 10m;
    ssl_ciphers         PROFILE=SYSTEM;
    ssl_prefer_server_ciphers on;

    # ---- security headers (ระดับข้อมูลสุขภาพ + PDPA) ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;
    client_max_body_size 5m;

    # =========================================================================
    #  API proxy → backend เครื่อง api-mophlink (TLS)
    #  /auth/mode → https://api-mophlink.moph.go.th/drugallergy/auth/mode
    # =========================================================================
    location /auth/ {
        limit_req zone=emac_rl burst=40 nodelay;
        proxy_pass https://api-mophlink.moph.go.th/drugallergy/auth/;
        include /etc/nginx/snippets/emac-api-proxy.conf;
    }
    location /api/ {
        limit_req zone=emac_rl burst=40 nodelay;
        proxy_pass https://api-mophlink.moph.go.th/drugallergy/api/;
        include /etc/nginx/snippets/emac-api-proxy.conf;
    }
    # embed: เปิดให้ HIS/ระบบอื่น iframe บัตรได้ → ไม่ใส่ X-Frame-Options
    # (add_header ใน location ทับชุดของ server — ใส่เฉพาะที่จำเป็น)
    location /embed/ {
        proxy_pass https://api-mophlink.moph.go.th/drugallergy/embed/;
        include /etc/nginx/snippets/emac-api-proxy.conf;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    location = /healthz {
        proxy_pass https://api-mophlink.moph.go.th/drugallergy/healthz;
        include /etc/nginx/snippets/emac-api-proxy.conf;
        access_log off;
    }

    # =========================================================================
    #  Frontend — static build (SPA)
    # =========================================================================
    root /var/www/emac-frontend/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    # cache assets ที่มี hash ในชื่อไฟล์ได้นาน (ใส่ HSTS ซ้ำเพราะ add_header ทับชุด server)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

# HTTP → HTTPS
server {
    listen      80;
    listen      [::]:80;
    server_name emac.moph.go.th;
    return 301 https://$host$request_uri;
}
